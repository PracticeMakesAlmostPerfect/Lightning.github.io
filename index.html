<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lightning Strikes Bowl</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    overflow-x: hidden;

    background: linear-gradient(180deg, #04060f, #0b1b3a, #050814);
    position: relative;
}

/* ☁️ FOG (optimized) */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 200%;
    height: 100%;

    background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.08) 0%, transparent 45%),
        radial-gradient(circle at 60% 20%, rgba(255,255,255,0.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 60%, rgba(255,255,255,0.05) 0%, transparent 55%),
        radial-gradient(circle at 30% 80%, rgba(255,255,255,0.04) 0%, transparent 60%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03) 0%, transparent 65%);

    filter: blur(1.5px);
    opacity: 0.55;

    animation: fogMove 120s linear infinite;
    pointer-events: none;
    z-index: 0;
}

body::after {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 200%;
    height: 100%;

    background:
        radial-gradient(circle at 10% 40%, rgba(255,255,255,0.05) 0%, transparent 50%),
        radial-gradient(circle at 70% 30%, rgba(255,255,255,0.04) 0%, transparent 55%),
        radial-gradient(circle at 40% 70%, rgba(255,255,255,0.05) 0%, transparent 60%);

    filter: blur(1.5px);
    opacity: 0.4;

    animation: fogMoveSlow 160s linear infinite;
    pointer-events: none;
    z-index: 0;
}

@keyframes fogMove {
    0% { transform: translateX(0); }
    100% { transform: translateX(-40%); }
}

@keyframes fogMoveSlow {
    0% { transform: translateX(0); }
    100% { transform: translateX(-25%); }
}

/* ⚡ LIGHTNING (lightened) */
.lightning-flash {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.10), transparent 70%);
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    animation: lightningSoft 15s infinite;
}

@keyframes lightningSoft {
    0%, 90%, 100% { opacity: 0; }
    91% { opacity: 0.05; }
    92% { opacity: 0; }
}

/* keep content above effects */
.hero, nav, section, footer {
    position: relative;
    z-index: 2;
}

/* HERO */
.hero {
    height: 100vh;
    background:
        linear-gradient(rgba(5,10,25,0.75), rgba(5,10,25,0.95)),
        url("background.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;

    position: relative;
    overflow: hidden;
}

/* 🌧️ Rain (disabled on mobile below) */
.rain, .rain2 {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.rain {
    background-image: url("https://i.imgur.com/U1c2x6M.png");
    opacity: 0.10;
    animation: rainMove 1.2s linear infinite;
}

.rain2 {
    background-image: url("https://i.imgur.com/U1c2x6M.png");
    opacity: 0.04;
    animation: rainMoveSlow 2.2s linear infinite;
}

@keyframes rainMove {
    0% { transform: translateY(-100px); }
    100% { transform: translateY(100px); }
}

@keyframes rainMoveSlow {
    0% { transform: translateY(-50px); }
    100% { transform: translateY(50px); }
}

/* NAV */
nav {
    position: sticky;
    top: 0;
    background: rgba(15,23,42,0.9);
    padding: 15px;
    display: flex;
    justify-content: center;
    gap: 25px;
    z-index: 10;
}

nav a {
    color: white;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover {
    color: #fbbf24;
}

/* SECTIONS */
section {
    padding: 80px 20px;
    max-width: 900px;
    margin: auto;
}

.card {
    background: rgba(15,23,42,0.85);
    padding: 25px;
    border-radius: 12px;
    margin-bottom: 20px;
}

h2 {
    color: #93c5fd;
}

/* HOURS */
.hours .row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.hours .row:last-child {
    border-bottom: none;
}

.hours .row span:first-child {
    font-weight: bold;
    color: #93c5fd;
}

/* FORM */
input, textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: none;
    border-radius: 6px;
    background: #1e293b;
    color: white;
}

button {
    background: #fbbf24;
    border: none;
    padding: 12px;
    width: 100%;
    cursor: pointer;
    font-weight: bold;
    border-radius: 6px;
}

footer {
    text-align: center;
    padding: 20px;
    background: #0f172a;
}

/* 🌩️ Glow Bowling (slightly reduced glow for performance) */
.glow {
    color: #38bdf8;
    font-weight: bold;
    text-shadow:
        0 0 3px #38bdf8,
        0 0 6px #0ea5e9;
}

/* 🎮 Pokemon Venue */
.poke-green {
    color: #39ff14;
    text-shadow: 0 0 4px #39ff14;
    font-weight: bold;
}

.mon-orange {
    color: #ff8c00;
    text-shadow: 0 0 4px #ff8c00;
    font-weight: bold;
}

.venue-blue {
    color: #38bdf8;
    text-shadow: 0 0 4px #38bdf8;
    font-weight: bold;
}

/* HERO TEXT */
.main-title {
    color: #fbbf24;
    font-size: 3rem;
    font-weight: 800;
    text-shadow:
        0 0 5px #fbbf24,
        0 0 10px #f59e0b;
}

.sub-title {
    color: #fbbf24;
    font-size: 1.2rem;
    margin-top: 10px;
}

.extra-title {
    margin-top: 15px;
    color: #fbbf24;
    font-size: 1rem;
    letter-spacing: 2px;
    text-transform: uppercase;
}

/* Birthday */
#birthdays {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.birth-title {
    margin-bottom: 40px;
    color: #fbbf24;
}

.birthday-layout {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
    flex-wrap: wrap;
}

.package-card {
    width: 260px;
    background: rgba(15,23,42,0.9);
    padding: 20px;
    border-radius: 12px;
}

/* CANDLE */
.candle {
    position: relative;
    width: 60px;
    height: 280px;
    background: linear-gradient(180deg, #ffe6a6, #ffb347);
    border-radius: 20px;
}

.candle-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-90deg);
    font-weight: bold;
    color: #3b2200;
    font-size: 14px;
}

/* 📱 MOBILE OPTIMIZATION */
@media (max-width: 768px) {

    body::before,
    body::after {
        display: none; /* fog removed */
    }

    .rain,
    .rain2 {
        display: none; /* rain removed */
    }

    .lightning-flash {
        display: none; /* lightning removed */
    }

    .hero {
        background-attachment: scroll;
    }
}
</style>
</head>

<body>

<div class="lightning-flash"></div>

<div class="hero">
    <div class="rain"></div>
    <div class="rain2"></div>

    <h1 class="main-title">Lightning Strikes Bowl</h1>
    <p class="sub-title">Family Fun. Great Food. Perfect Strikes.</p>
    <p class="extra-title">Monthly Events</p>
</div>

</body>
</html>
