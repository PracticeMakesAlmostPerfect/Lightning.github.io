<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lightning Strikes Bowl</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    overflow-x: hidden;
    background: #0f172a;
}

/* 🌩️ HERO */
.hero {
    height: 100vh;
    background:
        linear-gradient(rgba(5,10,25,0.75), rgba(5,10,25,0.95)),
        url("background.jpg.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;

    position: relative;
    overflow: hidden;
}

/* 🌧️ Rain layers */
.rain, .rain2 {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.rain {
    background-image: url("https://i.imgur.com/U1c2x6M.png");
    opacity: 0.12;
    animation: rainMove 0.6s linear infinite;
}

.rain2 {
    background-image: url("https://i.imgur.com/U1c2x6M.png");
    opacity: 0.05;
    animation: rainMoveSlow 1.2s linear infinite;
}

@keyframes rainMove {
    0% { transform: translateY(-100px); }
    100% { transform: translateY(100px); }
}

@keyframes rainMoveSlow {
    0% { transform: translateY(-50px); }
    100% { transform: translateY(50px); }
}

/* ⚡ Flash */
#flash {
    position: fixed;
    width: 100%;
    height: 100%;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 5;
}

/* ⚡ Glowing title */
.hero h1 {
    font-size: 70px;
    color: #fbbf24;
    margin: 0;
    text-shadow:
        0 0 10px rgba(251,191,36,0.7),
        0 0 25px rgba(251,191,36,0.5);
    animation: flicker 4s infinite;
    z-index: 2;
}

@keyframes flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.95; }
    52% { opacity: 1; }
    54% { opacity: 0.9; }
    56% { opacity: 1; }
}

.hero p {
    color: #93c5fd;
    font-size: 20px;
    margin-top: 10px;
    z-index: 2;
}

/* NAV */
nav {
    position: sticky;
    top: 0;
    background: rgba(15,23,42,0.9);
    padding: 15px;
    display: flex;
    justify-content: center;
    gap: 25px;
    z-index: 10;
}

nav a {
    color: white;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover {
    color: #fbbf24;
}

/* SECTIONS */
section {
    padding: 80px 20px;
    max-width: 900px;
    margin: auto;

    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s ease;
}

section.show {
    opacity: 1;
    transform: translateY(0);
}

.card {
    background: rgba(15,23,42,0.85);
    padding: 25px;
    border-radius: 12px;
    margin-bottom: 20px;
}

h2 {
    color: #93c5fd;
}

/* FORM */
input, textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: none;
    border-radius: 6px;
    background: #1e293b;
    color: white;
}

button {
    background: #fbbf24;
    border: none;
    padding: 12px;
    width: 100%;
    cursor: pointer;
    font-weight: bold;
    border-radius: 6px;
}

footer {
    text-align: center;
    padding: 20px;
    background: #0f172a;
}
</style>
</head>

<body>

<div id="flash"></div>

<!-- HERO -->
<div class="hero">
    <div class="rain"></div>
    <div class="rain2"></div>

    <h1>Lightning Strikes Bowl</h1>
    <p>Family Fun. Great Food. Perfect Strikes.</p>
</div>

<nav>
    <a href="#pricing">Pricing</a>
    <a href="#hours">Hours</a>
    <a href="#events">Events</a>
    <a href="#contact">Contact</a>
</nav>

<section id="pricing">
    <h2>Pricing</h2>
    <div class="card">
        <p><strong>Lane Rental:</strong> $__</p>
        <p><strong>Shoe Rental:</strong> $__</p>
    </div>
</section>

<section id="hours">
    <h2>Hours</h2>
    <div class="card">
        <p>Mon-Fri: __</p>
        <p>Sat: __</p>
        <p>Sun: __</p>
    </div>
</section>

<section id="events">
    <h2>Monthly Events</h2>
    <div class="card">
        <p>⚡ League Nights</p>
        <p>🎳 Family Specials</p>
        <p>🌩️ Glow Bowling</p>
    </div>
</section>

<section id="contact">
    <h2>Schedule a Visit</h2>
    <div class="card">
        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
            <input type="text" name="first_name" placeholder="First Name" required>
            <input type="text" name="last_name" placeholder="Last Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="tel" name="phone" placeholder="Phone Number" required>
            <textarea name="message" placeholder="Message"></textarea>
            <button type="submit">Send Request</button>
        </form>
    </div>
</section>

<footer>
    <p>© 2026 Lightning Strikes Bowl</p>
</footer>

<script>
function lightningFlash() {
    const flash = document.getElementById("flash");
    flash.style.opacity = "0.5";
    setTimeout(() => flash.style.opacity = "0", 120);
}

function randomLightning() {
    const delay = Math.random() * 7000 + 4000;
    setTimeout(() => {
        lightningFlash();
        randomLightning();
    }, delay);
}
randomLightning();

/* Scroll animation */
const sections = document.querySelectorAll("section");

window.addEventListener("scroll", () => {
    const trigger = window.innerHeight * 0.85;

    sections.forEach(sec => {
        const top = sec.getBoundingClientRect().top;
        if (top < trigger) {
            sec.classList.add("show");
        }
    });
});
</script>

</body>
</html>
